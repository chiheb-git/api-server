kind = "mobile"
previewPath = "/"
title = "PhoneVerify"
version = "1.0.0"
id = "artifacts/phone-verify"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21443

[services.development]
run = "pnpm --filter @workspace/phone-verify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phone-verify", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/phone-verify", "run", "serve" ]

[services.env]
PORT = "21443"
BASE_PATH = "/"
